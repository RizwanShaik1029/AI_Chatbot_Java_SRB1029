name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install Angular Dependencies
        working-directory: AI_CHATBOT_FRONTEND/devai-assistant-ui
        run: npm install

      - name: Build API Gateway
        working-directory: AI_CHATBOT_BACKEND/API-Gateway
        run: mvn clean package
        
      - name: Build Auth Service
        working-directory: AI_CHATBOT_BACKEND/auth
        run: mvn clean package
        
      - name: Build Eureka Server
        working-directory: AI_CHATBOT_BACKEND/eurekaserver
        run: mvn clean package
